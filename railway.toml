[build]
builder = "nixpacks"

[[services]]
name = "api"
buildCommand = "npm ci && npm run build --workspace=apps/api"
startCommand = "node apps/api/dist/index.js"
watchPatterns = ["apps/api/**"]

[[services]]
name = "web"
buildCommand = "npm ci && npm run build --workspace=apps/web"
startCommand = "npx serve apps/web/dist -p $PORT"
watchPatterns = ["apps/web/**"]
